<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b937e"/>
      <stop offset="1" stop-color="#d49a5e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff6e6"/>
      <stop offset="1" stop-color="#f3c98a"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <g fill="none" stroke="#fffdf9" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- hanging loop -->
    <path d="M32 11.5 a3 3 0 0 1 0 6"/>
    <!-- top cap -->
    <path d="M23 22 l4 -4 h10 l4 4 z"/>
    <!-- lantern body -->
    <path d="M23.5 22 v20 h17 v-20"/>
    <!-- base -->
    <path d="M21.5 42 h21 l-2.5 5 h-16 z"/>
  </g>
  <!-- warm glow -->
  <rect x="28" y="27" width="8" height="11" rx="3" fill="url(#glow)"/>
</svg>
